<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VivoCloud Logo Options</title>
    <style>
      :root {
        --bg: #070b14;
        --card: #131d31;
        --line: rgba(255, 255, 255, 0.14);
        --text: #f6f8ff;
        --muted: #9fb0d0;
        --accent: #6ea8fe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 5% 0%, #1a2a4a 0, var(--bg) 44%);
        color: var(--text);
      }

      .container {
        width: min(1080px, 94vw);
        margin: 0 auto;
        padding: 38px 0 46px;
      }

      h1 {
        margin: 0 0 8px;
      }

      .intro {
        color: var(--muted);
        margin: 0 0 24px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .preview {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #0b1323;
        padding: 14px;
      }

      .preview img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        color: var(--text);
        text-decoration: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #8ac4ff);
        color: #06101f;
        border: none;
        font-weight: 600;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>VivoCloud Logo Options</h1>
      <p class="intro">
        Pick your favorite and I will apply it across the site before pushing.
      </p>

      <section class="grid">
        <article class="card">
          <h2>Option A - Cloud Check (current)</h2>
          <div class="preview">
            <img src="assets/logo-vivocloud.svg" alt="VivoCloud Cloud Check logo" />
          </div>
        </article>

        <article class="card">
          <h2>Option B - Orbit</h2>
          <div class="preview">
            <img src="assets/logo-vivocloud-orbit.svg" alt="VivoCloud Orbit logo" />
          </div>
        </article>

        <article class="card">
          <h2>Option C - Minimal Monogram</h2>
          <div class="preview">
            <img src="assets/logo-vivocloud-minimal.svg" alt="VivoCloud Minimal logo" />
          </div>
        </article>

        <article class="card">
          <h2>Option D - Pulse</h2>
          <div class="preview">
            <img src="assets/logo-vivocloud-pulse.svg" alt="VivoCloud Pulse logo" />
          </div>
        </article>
      </section>

      <div class="actions">
        <a class="btn btn-primary" href="index.html">Back to website preview</a>
      </div>
    </main>
  </body>
</html>
